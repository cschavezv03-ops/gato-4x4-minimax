# Levanta el juego completo: API (backend) e interfaz web (frontend).
# Uso:  docker compose up --build
# Luego abrir http://localhost:5173

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      CORS_ORIGINS: "http://localhost:5173"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "http://localhost:8000"
    ports:
      - "5173:80"
    depends_on:
      - backend
